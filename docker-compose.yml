version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: one4_mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: 'newone4'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Uncomment the line below when you have an init.sql file to seed the database
      # - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: one4_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=newone4
      - PORT=5000
    depends_on:
      - mysql

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile.dev
    container_name: one4_frontend
    ports:
      - "80:80"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  mysql_data:
